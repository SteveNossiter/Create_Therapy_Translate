<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Therapy Session Notes</title>
  <link rel="icon" href="data:,">
  
  <!-- Load the Supabase Library & League Spartan Font -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root { 
      --primary: #007aff; 
      --primary-dark: #005bb5;
      --danger: #ff3b30; 
      --danger-dark: #b32a22;
      --warning: #ff9500;
      --warning-dark: #b36800;
      --success: #34c759; 
      --success-dark: #248a3d;
      --text: #0a2e3f; /* Deep teal drawn from the painting */
      --card-bg: #ffffff; 
    }
    
    body { 
      font-family: 'League Spartan', sans-serif; 
      max-width: 900px; 
      margin: 0 auto; 
      padding: 30px 20px; 
      color: var(--text); 
      line-height: 1.5;
      background-image: url('IMG_4213.JPG.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    
    h1 { font-size: 32px; font-weight: 600; margin-bottom: 5px; margin-top: 0; }
    p.subtitle { color: #3a5a6b; font-weight: 400; margin-top: 0; margin-bottom: 25px; font-size: 18px; }
    
    /* Glassmorphic Panel */
    .glass-panel {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
      position: relative;
    }

    /* 3D Tactile Buttons */
    .controls { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
    
    button { 
      font-family: 'League Spartan', sans-serif;
      padding: 12px 24px; 
      font-size: 18px; 
      font-weight: 500; 
      border: none; 
      border-radius: 50px; /* Pill shape */
      cursor: pointer; 
      color: white; 
      transition: all 0.1s ease;
      transform: translateY(-4px);
    }
    
    button:disabled { 
      opacity: 0.5; 
      cursor: not-allowed; 
      transform: translateY(0);
      box-shadow: none !important;
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }
    
    #recordBtn { 
      background-color: var(--danger); 
      box-shadow: 0 6px 0px var(--danger-dark), 0 10px 15px rgba(0,0,0,0.1); 
    }
    #recordBtn:active:not(:disabled) { box-shadow: 0 2px 0px var(--danger-dark), 0 4px 8px rgba(0,0,0,0.1); }
    
    #stopBtn { 
      background-color: var(--warning); 
      box-shadow: 0 6px 0px var(--warning-dark), 0 10px 15px rgba(0,0,0,0.1); 
    }
    #stopBtn:active:not(:disabled) { box-shadow: 0 2px 0px var(--warning-dark), 0 4px 8px rgba(0,0,0,0.1); }
    
    #processBtn { 
      background-color: var(--primary); 
      box-shadow: 0 6px 0px var(--primary-dark), 0 10px 15px rgba(0,0,0,0.1); 
    }
    #processBtn:active:not(:disabled) { box-shadow: 0 2px 0px var(--primary-dark), 0 4px 8px rgba(0,0,0,0.1); }
    
    #loginBtn { 
      background-color: var(--primary); 
      width: 100%; 
      box-shadow: 0 6px 0px var(--primary-dark), 0 10px 15px rgba(0,0,0,0.1);
    }
    #loginBtn:active:not(:disabled) { box-shadow: 0 2px 0px var(--primary-dark), 0 4px 8px rgba(0,0,0,0.1); }

    /* Pulsing Glow Animation for Recording */
    .recording-pulse {
      animation: pulseGlow 1.5s infinite alternate;
    }
    
    @keyframes pulseGlow {
      0% { box-shadow: 0 6px 0px var(--danger-dark), 0 10px 15px rgba(0,0,0,0.1), 0 0 10px rgba(255, 59, 48, 0.3); }
      100% { box-shadow: 0 6px 0px var(--danger-dark), 0 10px 15px rgba(0,0,0,0.1), 0 0 35px rgba(255, 59, 48, 0.9); }
    }

    /* Status Panel */
    .status-panel { 
      background: rgba(255, 255, 255, 0.5); 
      padding: 15px 20px; 
      border-radius: 16px; 
      font-size: 16px; 
      display: flex; 
      justify-content: space-between; 
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    .status-text { font-weight: 500; }
    .timer { font-family: monospace; font-size: 18px; font-weight: 600; color: var(--danger); }
    
    /* Login & Setup Styles */
    #loginScreen { max-width: 400px; margin: 80px auto; text-align: center; }
    .input-field { 
      font-family: 'League Spartan', sans-serif;
      width: 100%; 
      padding: 14px; 
      margin-bottom: 15px; 
      border: 2px solid rgba(10, 46, 63, 0.1); 
      border-radius: 12px; 
      box-sizing: border-box; 
      font-size: 16px; 
      background: rgba(255,255,255,0.9);
    }
    .password-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
    .password-wrapper .input-field { margin-bottom: 0; padding-right: 60px; }
    .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--primary); font-size: 14px; font-weight: 600; cursor: pointer; padding: 0; box-shadow: none; }
    .toggle-password:active:not(:disabled) { box-shadow: none; transform: translateY(-50%); }
    
    #loginError { color: var(--danger); font-size: 15px; margin-top: 15px; display: none; font-weight: 500; }
    #logoutBtn { background-color: transparent; color: var(--text); padding: 8px 12px; font-size: 14px; position: absolute; top: 20px; right: 20px; box-shadow: none; border: 1px solid rgba(10, 46, 63, 0.2); transform: none; }
    #logoutBtn:hover { background: rgba(10, 46, 63, 0.05); }
    
    #mainApp { display: none; }

    /* Results Windows (Solid White) */
    .windows-container { display: flex; flex-direction: column; gap: 25px; display: none; }
    .windows-container.active { display: flex; }
    @media (min-width: 768px) { .windows-container.active { flex-direction: row; align-items: stretch; } }
    
    .window-card { 
      background: var(--card-bg); 
      border-radius: 20px; 
      padding: 25px; 
      flex: 1; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
      display: flex; 
      flex-direction: column; 
      min-width: 0; 
    }
    .window-card h2 { margin-top: 0; font-size: 22px; font-weight: 600; border-bottom: 2px solid #f2f2f7; padding-bottom: 12px; margin-bottom: 15px; }
    
    .export-controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .export-btn { 
      background-color: var(--success); 
      padding: 8px 16px; 
      font-size: 14px; 
      border-radius: 50px; 
      box-shadow: 0 4px 0px var(--success-dark), 0 4px 6px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }
    .export-btn:active:not(:disabled) {
      box-shadow: 0 1px 0px var(--success-dark), 0 2px 3px rgba(0,0,0,0.1);
      transform: translateY(0);
    }
    
    .content-box { 
      white-space: pre-wrap; 
      font-size: 15px; 
      color: #3a3a3c; 
      flex-grow: 1; 
      background: #fafafa; 
      padding: 20px; 
      border-radius: 12px; 
      border: 1px solid #e5e5ea; 
      overflow-y: auto; 
      max-height: 600px; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; /* Keep transcript readable in standard system font */
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="glass-panel">
    <h2>Clinic Login</h2>
    <p class="subtitle" style="margin-bottom: 25px;">Secure Session Access</p>
    <input type="email" id="emailInput" class="input-field" placeholder="Email Address">
    
    <div class="password-wrapper">
      <input type="password" id="passwordInput" class="input-field" placeholder="Password">
      <button type="button" id="togglePasswordBtn" class="toggle-password">Show</button>
    </div>
    
    <button id="loginBtn">Log In</button>
    <div id="loginError"></div>
  </div>

  <!-- MAIN APPLICATION -->
  <div id="mainApp">
    
    <div class="glass-panel">
      <button id="logoutBtn">Log Out</button>
      <h1>Create Therapy Notes</h1>
      <p class="subtitle">Secure session transcription & clinical report</p>

      <div class="controls">
        <button id="recordBtn">Record</button>
        <button id="stopBtn" disabled>Stop</button>
        <button id="processBtn" disabled>Generate</button>
      </div>

      <div class="status-panel">
        <span class="status-text" id="status">Ready to record.</span>
        <span class="timer" id="timer">00:00:00</span>
      </div>
    </div>

    <!-- OPAQUE RESULTS WINDOWS -->
    <div class="windows-container" id="windowsContainer">
      <div class="window-card">
        <h2>Transcript</h2>
        <div class="export-controls">
          <button class="export-btn" onclick="shareContent('transcriptContent', 'Session Transcript')">Share</button>
          <button class="export-btn" onclick="copyContent('transcriptContent', this)">Copy</button>
          <button class="export-btn" onclick="downloadContent('transcriptContent', 'Transcript')">Download</button>
        </div>
        <div id="transcriptContent" class="content-box">Awaiting data...</div>
      </div>

      <div class="window-card">
        <h2>Clinical Report</h2>
        <div class="export-controls">
          <button class="export-btn" onclick="shareContent('reportContent', 'Clinical Report')">Share</button>
          <button class="export-btn" onclick="copyContent('reportContent', this)">Copy</button>
          <button class="export-btn" onclick="downloadContent('reportContent', 'Clinical_Report')">Download</button>
        </div>
        <div id="reportContent" class="content-box">Awaiting data...</div>
      </div>
    </div>
  </div>

  <script>
    // ---------------------------------------------------------
    // SUPABASE CONFIGURATION (CLINICAL METHOD)
    // ---------------------------------------------------------
    const SUPABASE_URL = 'https://awtyxmetipldytjmzayb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dHl4bWV0aXBsZHl0am16YXliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2OTQ4NTgsImV4cCI6MjEwMDI3MDg1OH0._140M0v7pPSAPWJXOZYm8Nbw-vNVAbrqQEHfhGIm6UY';
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { storage: window.sessionStorage }
    });

    // ---------------------------------------------------------
    // STATE VARIABLES
    // ---------------------------------------------------------
    let currentTherapistName = "Therapist";
    let sessionStartTimeDate = null;
    let sessionStopTimeDate = null;

    // ---------------------------------------------------------
    // AUTHENTICATION LOGIC
    // ---------------------------------------------------------
    const loginScreen = document.getElementById('loginScreen');
    const mainApp = document.getElementById('mainApp');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const togglePasswordBtn = document.getElementById('togglePasswordBtn');
    const loginError = document.getElementById('loginError');

    async function checkSession() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        currentTherapistName = session.user.user_metadata?.display_name || session.user.email;
        showApp();
      }
    }
    checkSession();

    togglePasswordBtn.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      togglePasswordBtn.innerText = type === 'password' ? 'Show' : 'Hide';
    });

    function handleEnterKey(e) {
      if (e.key === 'Enter') {
        loginBtn.click();
      }
    }
    emailInput.addEventListener('keyup', handleEnterKey);
    passwordInput.addEventListener('keyup', handleEnterKey);

    loginBtn.addEventListener('click', async () => {
      loginBtn.innerText = "Authenticating...";
      loginBtn.disabled = true;
      loginError.style.display = 'none';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: emailInput.value.trim(),
          password: passwordInput.value
        });

        if (error) throw error;

        if (data.session) {
          currentTherapistName = data.session.user.user_metadata?.display_name || data.session.user.email;
          showApp();
        } else {
          throw new Error("Login failed. Ensure the email address is verified in Supabase.");
        }
      } catch (err) {
        loginError.innerText = err.message;
        loginError.style.display = 'block';
        loginBtn.innerText = "Log In";
        loginBtn.disabled = false;
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      mainApp.style.display = 'none';
      loginScreen.style.display = 'block';
      emailInput.value = '';
      passwordInput.value = '';
      passwordInput.setAttribute('type', 'password');
      togglePasswordBtn.innerText = 'Show';
      loginBtn.innerText = "Log In";
      loginBtn.disabled = false;
    });

    function showApp() {
      loginScreen.style.display = 'none';
      mainApp.style.display = 'block';
    }

    // ---------------------------------------------------------
    // RECORDING & PROCESSING LOGIC
    // ---------------------------------------------------------
    const WORKER_URL = 'https://raimble-api.soundlifeaudio.workers.dev/';
    
    let mediaRecorder;
    let audioChunks = [];
    let audioBase64 = '';
    let mimeType = '';
    let timerInterval;
    let secondsElapsed = 0;
    let wakeLock = null;

    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); }
      } catch (err) { console.log('Wake Lock error:', err.message); }
    }

    function releaseWakeLock() {
      if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); }
    }

    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const processBtn = document.getElementById('processBtn');
    const statusText = document.getElementById('status');
    const timerDisplay = document.getElementById('timer');
    const windowsContainer = document.getElementById('windowsContainer');
    const transcriptContent = document.getElementById('transcriptContent');
    const reportContent = document.getElementById('reportContent');

    function formatTime(sec) {
      const h = Math.floor(sec / 3600).toString().padStart(2, '0');
      const m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
      const s = (sec % 60).toString().padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    recordBtn.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { audioBitsPerSecond: 16000 });
        audioChunks = [];

        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };

        mediaRecorder.onstop = async () => {
          clearInterval(timerInterval);
          mimeType = mediaRecorder.mimeType || 'audio/webm';
          const audioBlob = new Blob(audioChunks, { type: mimeType });
          audioBase64 = await blobToBase64(audioBlob);
          statusText.innerText = "Audio captured. Ready to process.";
          processBtn.disabled = false;
        };

        sessionStartTimeDate = new Date();

        mediaRecorder.start(1000); 
        secondsElapsed = 0;
        timerInterval = setInterval(() => {
          secondsElapsed++;
          timerDisplay.innerText = formatTime(secondsElapsed);
        }, 1000);

        await requestWakeLock();

        statusText.innerText = "Recording session (Screen locked ON)...";
        recordBtn.disabled = true;
        recordBtn.classList.add('recording-pulse'); // Add glowing animation
        stopBtn.disabled = false;
        processBtn.disabled = true;
        windowsContainer.classList.remove('active');
        
      } catch (err) {
        statusText.innerText = "Error: Microphone access denied.";
      }
    });

    stopBtn.addEventListener('click', () => {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
      }
      
      sessionStopTimeDate = new Date();

      releaseWakeLock();
      recordBtn.disabled = false;
      recordBtn.classList.remove('recording-pulse'); // Remove glowing animation
      stopBtn.disabled = true;
    });

    processBtn.addEventListener('click', async () => {
      if (!audioBase64) return;
      
      statusText.innerText = "Transcribing and generating report...";
      processBtn.disabled = true;
      windowsContainer.classList.add('active');
      transcriptContent.innerText = "Processing audio... (This usually takes 10-30 seconds)";
      reportContent.innerText = "Analyzing transcript for clinical notes...";

      const currentDate = sessionStartTimeDate ? sessionStartTimeDate.toLocaleDateString('en-AU') : new Date().toLocaleDateString('en-AU');
      const startTimeStr = sessionStartTimeDate ? sessionStartTimeDate.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', hour12: false }) : "";
      const stopTimeStr = sessionStopTimeDate ? sessionStopTimeDate.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', hour12: false }) : "";

      const SYSTEM_PROMPT = `You are an expert clinical documentation assistant for an arts therapy practice. 

Instructions:
1. Transcription: Listen to the provided audio. Translate any non-English speech into English and provide a highly accurate, clean transcript. You MUST separate the dialogue by speaker. Every time a different person speaks, start a new line and label them clearly (e.g., **Speaker 1:** [dialogue], **Speaker 2:** [dialogue]).
2. Clinical Report: Based on the transcript, generate a comprehensive clinical session report following the exact structure and headings provided below. 

Use objective, professional, and clinical language. If a specific section's information is not mentioned in the audio (such as "Scales"), leave it blank or write "N/A". 

You MUST format your exact response like this, using the three pipes (|||) as a separator:

[Insert full translated English transcript here, with speakers delineated on new lines]
|||
Goals:
[List assessment methods used, presenting issues, (+) goals, and (-) reduction targets]

Interventions:
[Briefly list primary practical interventions/mediums used]

Scales:
[List any scales used, or N/A]

Session Date: ${currentDate}
Start Time: ${startTimeStr}
Stop Time: ${stopTimeStr}

Patient had their session with ${currentTherapistName}.

Summary of Client’s Narrative
[Bullet points detailing the client's spoken history, current context, and stated goals]

Client’s Behaviour
[Bullet points detailing engagement, initiative, physical actions, and capacity for self-reflection]

Client’s Feelings
[Bullet points detailing expressed emotions, desires, and reported affect]

Therapist’s Interventions
[Bullet points detailing your specific actions, psychoeducation provided, and therapeutic framing]

Client’s Response to Art Therapy
[Bullet points detailing specific reactions to the creative medium, symbolic linking, and affect during artmaking]

Evidence of Significant Departure from Anticipated Progress
[Note any departures, or state "No significant departures"]

Major Life Events
[Bullet points of any recent or impending major life transitions]

Change of Assessment/Plan
[Bullet points detailing any shifts in session frequency or clinical focus]

PROCESS

Client Comments About Process
[Bullet points detailing what the client said about the therapy/artmaking process itself]

Therapist’s Observations
[Bullet points detailing your clinical observations of their insight, symbolic thinking, and adaptability]

NOTES FOR NEXT SESSION

Agreement About Between-Session Activities
[Homework or reflections set for the client]

Issues to Be Raised During Session
[Specific themes, mediums, or discussions to carry over to the next session]

Issues for Therapy Supervision
[Any clinical risks or monitoring required, or "None identified"]`;

      const payload = {
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: [{
          role: "user",
          parts: [
            { inlineData: { mimeType: mimeType, data: audioBase64 } },
            { text: "Process this session audio." }
          ]
        }]
      };

      try {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        
        if (!response.ok || data.error) {
          const errorMessage = data.error?.message || `HTTP Error ${response.status}`;
          throw new Error(`Google Cloud API Error: ${errorMessage}`);
        }
        
        const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
        let sections = rawText.split('|||');
        
        if (sections.length < 2) {
          const fallbackSplit = rawText.split(/(?:\n|^)(?=\*\*Goals:\*\*|Goals:)/i);
          if (fallbackSplit.length >= 2) {
            sections = [fallbackSplit[0], fallbackSplit.slice(1).join('\n')];
          }
        }
        
        if (sections.length >= 2) {
          transcriptContent.innerHTML = sections[0].trim().replace(/\n/g, '<br>');
          reportContent.innerHTML = sections[1].trim().replace(/\n/g, '<br>');
        } else {
          transcriptContent.innerHTML = "Delimiter missing. Full output below:<br><br>" + rawText.replace(/\n/g, '<br>');
          reportContent.innerHTML = "See Transcript window.";
        }
        
        statusText.innerText = "Success.";
      } catch (err) {
        transcriptContent.innerHTML = `<strong style="color: red;">${err.message}</strong>`;
        reportContent.innerText = "Processing failed. See error in Transcript window.";
        statusText.innerText = "Processing failed.";
      }
      processBtn.disabled = false;
    });

    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function shareContent(elementId, title) {
      const text = document.getElementById(elementId).innerText;
      if (navigator.share) {
        try { await navigator.share({ title: title, text: text }); } 
        catch (err) { console.log('Share canceled', err); }
      } else { alert("Web Share not supported on this browser."); }
    }

    async function copyContent(elementId, btnElement) {
      const text = document.getElementById(elementId).innerText;
      try {
        await navigator.clipboard.writeText(text);
        const originalText = btnElement.innerText;
        btnElement.innerText = "Copied!";
        setTimeout(() => btnElement.innerText = originalText, 2000);
      } catch (err) { alert("Failed to copy text."); }
    }

    function downloadContent(elementId, prefix) {
      const text = document.getElementById(elementId).innerText;
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const dateStr = new Date().toISOString().split('T')[0];
      
      a.href = url;
      a.download = `${prefix}_${dateStr}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
